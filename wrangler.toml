# Cloudflare Pages configuration for the Brainzie site.
# The publishable static site lives in ./site (HTML/CSS/assets + the courses,
# including the committed Blazor WASM apps); the contact-form backend is the
# Pages Function in ./functions/api/contact.js — same layout as
# emsurge-landingpage.
#
# Secrets are NOT stored here. They are uploaded by the BrainzieLanding
# PowerShell module (scripts/BrainzieLanding):
#   Initialize-BrainzieLanding      -> TURNSTILE_SECRET
#   Initialize-BrainzieZohoMailer   -> ZOHO_CLIENT_SECRET, ZOHO_REFRESH_TOKEN
#
# Email goes through the Zoho Mail API. hello@brainzie.co.uk is a GROUP (it
# cannot sign in or own OAuth grants); the only user is directors@brainzie.co.uk,
# so the Self Client refresh token is minted BY directors@ and the form sends
# FROM directors@ TO hello@ (the group receives fine). The token is inherently
# bound to that one mailbox — the Zoho analogue of emsurge's Exchange
# application access policy. Until the Zoho secrets are set, submissions are
# still captured in LEADS KV.

name = "brainzie"
compatibility_date = "2025-06-01"
pages_build_output_dir = "site"

# --- Plain (non-secret) environment variables exposed to the contact Function ---
[vars]
CONTACT_TO   = "hello@brainzie.co.uk"       # the group every submission is emailed to
CONTACT_FROM = "directors@brainzie.co.uk"   # the USER mailbox the app sends as (hello@ is a group and can't authenticate;
                                            # flip this to hello@ only if "send emails as group" is enabled for directors@)
# Zoho data centre bases. brainzie.co.uk MX is mx.zoho.com → the .com DC.
# If the API console says otherwise (e.g. accounts.zoho.eu), change BOTH.
ZOHO_ACCOUNTS_BASE = "https://accounts.zoho.com"
ZOHO_MAIL_BASE     = "https://mail.zoho.com"
ZOHO_CLIENT_ID     = "REPLACE_WITH_ZOHO_CLIENT_ID"   # Self Client id (not secret) — filled by Initialize-BrainzieZohoMailer
ZOHO_ACCOUNT_ID    = ""                              # optional; auto-discovered and cached in KV when empty

# --- KV: durable backup of every form submission (+ Zoho token cache) ---
# Create with `npx wrangler kv namespace create LEADS` and paste the id here.
[[kv_namespaces]]
binding = "LEADS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
