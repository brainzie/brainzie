# Cloudflare Pages configuration for the Brainzie site.
# The publishable static site lives in ./site (HTML/CSS/assets + the courses,
# including the committed Blazor WASM apps); the contact-form backend is the
# Pages Function in ./functions/api/contact.js — same layout as
# emsurge-landingpage.
#
# The site deploys via Cloudflare's git integration (SETUP.md "Publishing"):
# pushing main publishes; Cloudflare's build system reads THIS file as the
# source of truth (no build command, output = site/, functions/ picked up
# automatically). The KV id and Zoho ids below MUST be real (not REPLACE_WITH_*
# placeholders) before the git connection is made — with git builds there is
# no deploy script left to substitute them.
#
# Secrets are NOT stored here. They are uploaded by the BrainzieLanding
# PowerShell module (scripts/BrainzieLanding):
#   Initialize-BrainzieLanding      -> TURNSTILE_SECRET
#   Initialize-BrainzieZohoMailer   -> ZOHO_CLIENT_SECRET, ZOHO_REFRESH_TOKEN
#
# Email goes through the Zoho Mail API using a DEDICATED SERVICE ACCOUNT
# (svc-mailer@brainzie.co.uk, "Brainzie Website Mailer") — never a person's
# account, so the credential can be disabled/rotated/audited independently.
# hello@brainzie.co.uk is a GROUP (groups cannot sign in or own OAuth grants);
# the service user is a member of the group with "send emails as group"
# enabled, so the form sends FROM hello@ TO hello@. The Self Client refresh
# token is minted BY the service user and is inherently bound to it — the
# Zoho analogue of emsurge's Exchange application access policy. Until the
# Zoho secrets are set, submissions are still captured in LEADS KV.

name = "brainzie"
compatibility_date = "2025-06-01"
pages_build_output_dir = "site"

# --- Plain (non-secret) environment variables exposed to the contact Function ---
[vars]
CONTACT_TO   = "hello@brainzie.co.uk"   # the group every submission is emailed to
CONTACT_FROM = "hello@brainzie.co.uk"   # sent AS the group, via the svc-mailer@ service account's send-as-group
                                        # permission. If that permission isn't granted (Initialize-BrainzieZohoMailer
                                        # warns), set this to the service address (svc-mailer@brainzie.co.uk).
# Zoho data centre bases. brainzie.co.uk MX is mx.zoho.com → the .com DC.
# If the API console says otherwise (e.g. accounts.zoho.eu), change BOTH.
ZOHO_ACCOUNTS_BASE = "https://accounts.zoho.com"
ZOHO_MAIL_BASE     = "https://mail.zoho.com"
ZOHO_CLIENT_ID     = "REPLACE_WITH_ZOHO_CLIENT_ID"   # Self Client id (not secret) — filled by Initialize-BrainzieZohoMailer
ZOHO_ACCOUNT_ID    = ""                              # optional; auto-discovered and cached in KV when empty

# --- KV: durable backup of every form submission (+ Zoho token cache) ---
# Create with `npx wrangler kv namespace create LEADS` and paste the id here.
[[kv_namespaces]]
binding = "LEADS"
id = "086d0991a1af41d08b97378507b40dc8"
