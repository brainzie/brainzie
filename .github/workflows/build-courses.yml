name: Build course apps

# Rebuilds the Blazor WebAssembly app for each course whenever its source
# under apps-src/ changes, then commits the regenerated static output back to
# site/courses/<slug>/app — keeping the committed output in sync with source.
# NOTE: the site is published to Cloudflare Pages with ./deploy.ps1 (or the
# Cloudflare dashboard); committing here does NOT publish by itself.
#
# Free on public repositories.

on:
  push:
    branches: [main]
    paths:
      - 'apps-src/**'
      - '.github/workflows/build-courses.yml'
  workflow_dispatch: {}   # allow a manual run from the Actions tab

permissions:
  contents: write          # needed to commit the rebuilt output back

concurrency:
  group: build-courses
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build every course app
        shell: pwsh
        run: |
          Import-Module ./scripts/BrainzieLanding/BrainzieLanding.psd1 -Force
          $courses = Get-ChildItem -Directory apps-src -Filter 'Course*' |
                     ForEach-Object { ($_.Name -replace '^Course','') }
          foreach ($c in $courses) {
            Write-Host "::group::Course $c"
            Build-BrainzieCourseApp -Course $c
            Write-Host "::endgroup::"
          }

      - name: Commit rebuilt output (if changed)
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/courses
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
          } else {
            git commit -m "ci: rebuild course apps [skip ci]"
            git push
          }
