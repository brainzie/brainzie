<?xml version="1.0" encoding="UTF-8"?>
<!-- Brainzie icon — circuit-brain. Stylised brain (lobes, fissure) with circuit traces + nodes. Signature magenta. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Brainzie">
  <!-- brain mass: overlapping lobes give the bumpy silhouette -->
  <g fill="#D81B72">
    <circle cx="31" cy="30" r="12"/><circle cx="43" cy="24" r="12.5"/><circle cx="57" cy="24" r="12.5"/><circle cx="69" cy="30" r="12"/>
    <circle cx="22" cy="42" r="12"/><circle cx="78" cy="42" r="12"/>
    <circle cx="36" cy="41" r="14"/><circle cx="50" cy="39" r="15.5"/><circle cx="64" cy="41" r="14"/>
    <circle cx="29" cy="55" r="13"/><circle cx="50" cy="56" r="16"/><circle cx="71" cy="55" r="13"/>
    <circle cx="40" cy="65" r="12"/><circle cx="60" cy="65" r="12"/>
    <path d="M44 63 h12 v11 a6 6 0 0 1 -12 0 z"/>
  </g>
  <!-- central fissure: the defining brain groove (kept bold for small sizes) -->
  <path d="M50 16 C45 27 55 34 50 43 C45 52 55 59 50 67" fill="none" stroke="#FDFBFE" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- circuit traces (geometric, with right-angle bends) -->
  <g fill="none" stroke="#FDFBFE" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 31 H40 V38"/>
    <path d="M50 50 H61 V42"/>
    <path d="M44 58 H35 V63"/>
    <path d="M56 36 H64"/>
    <path d="M30 46 H38"/>
    <path d="M62 60 H70"/>
  </g>
  <!-- circuit nodes at the trace ends -->
  <g fill="#FDFBFE">
    <circle cx="40" cy="38" r="2.6"/><circle cx="61" cy="42" r="2.6"/><circle cx="35" cy="63" r="2.6"/>
    <circle cx="64" cy="36" r="2.6"/><circle cx="30" cy="46" r="2.6"/><circle cx="70" cy="60" r="2.6"/>
  </g>
</svg>
