<?xml version="1.0" encoding="UTF-8"?>
<!-- Brainzie icon — stylised brain. Signature magenta on transparent. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Brainzie">
  <!-- brain mass: overlapping lobes give the bumpy silhouette -->
  <g fill="#D81B72">
    <circle cx="30" cy="31" r="12"/><circle cx="44" cy="25" r="13"/><circle cx="56" cy="25" r="13"/><circle cx="70" cy="31" r="12"/>
    <circle cx="22" cy="43" r="12"/><circle cx="78" cy="43" r="12"/>
    <circle cx="35" cy="43" r="14"/><circle cx="50" cy="41" r="16"/><circle cx="65" cy="43" r="14"/>
    <circle cx="30" cy="57" r="13"/><circle cx="50" cy="57" r="16"/><circle cx="70" cy="57" r="13"/>
    <circle cx="41" cy="66" r="12"/><circle cx="59" cy="66" r="12"/>
    <!-- brain stem -->
    <path d="M44 64 h12 v12 a6 6 0 0 1 -12 0 z"/>
  </g>
  <!-- gyri / folds carved as negative space -->
  <g fill="none" stroke="#FDFBFE" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round">
    <!-- central fissure between the hemispheres -->
    <path d="M50 18 C46 28 54 35 50 43 C46 51 54 58 50 66"/>
    <!-- left hemisphere folds -->
    <path d="M31 33 C24 38 30 44 23 49"/>
    <path d="M27 58 C34 60 30 64 37 65"/>
    <!-- right hemisphere folds -->
    <path d="M69 33 C76 38 70 44 77 49"/>
    <path d="M73 58 C66 60 70 64 63 65"/>
  </g>
</svg>
