# Cloudflare Worker for the brainzie.co.uk contact form.
#
# The site itself stays on GitHub Pages — this Worker only serves
# POST https://api.brainzie.co.uk/api/contact (the form backend).
# The brainzie.co.uk DNS zone is already on Cloudflare, so the custom domain
# below is created automatically on first deploy. See SETUP.md.
#
# Secrets are NOT stored here. Set them with (from this folder):
#   npx wrangler secret put TURNSTILE_SECRET
#   npx wrangler secret put SENDGRID_API_KEY
# Until they are set: Turnstile verification is skipped and email is skipped —
# but every submission is still captured in the LEADS KV namespace.

name = "brainzie-contact"
main = "src/contact.js"
compatibility_date = "2025-06-01"

routes = [
  { pattern = "api.brainzie.co.uk", custom_domain = true }
]

[vars]
CONTACT_TO      = "hello@brainzie.co.uk"    # where form submissions are emailed
CONTACT_FROM    = "noreply@brainzie.co.uk"  # must be a verified SendGrid sender (see SETUP.md)
ALLOWED_ORIGINS = "https://brainzie.co.uk,https://www.brainzie.co.uk,http://localhost:8123"

# --- KV: durable backup of every form submission ---
# Create with `npx wrangler kv namespace create LEADS` and paste the id here.
[[kv_namespaces]]
binding = "LEADS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
